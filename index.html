<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第六章 802.11e QoS 複習系統</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  min-height: 100vh;
  color: #222;
  padding: 16px;
}
.container { max-width: 1180px; margin: 0 auto; }
header {
  background: rgba(255,255,255,.96);
  border-radius: 16px;
  padding: 24px 28px;
  margin-bottom: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,.2);
}
header h1 { font-size: 26px; color: #1e3c72; }
header p { color: #555; margin-top: 6px; font-size: 14px; }
.progress-bar-wrap { margin-top: 14px; background: #e8eef7; border-radius: 8px; overflow: hidden; height: 12px; }
.progress-bar { background: linear-gradient(90deg, #4CAF50, #8BC34A); height: 100%; width: 0%; transition: width .3s; }
.progress-text { font-size: 12px; color: #666; margin-top: 6px; }

nav.tabs {
  background: rgba(255,255,255,.96);
  border-radius: 16px;
  padding: 10px;
  margin-bottom: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  box-shadow: 0 8px 20px rgba(0,0,0,.15);
}
.tab {
  flex: 1 1 auto;
  min-width: 110px;
  padding: 10px 14px;
  border: none;
  background: #f0f4fa;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: #34495e;
  transition: all .2s;
}
.tab:hover { background: #d8e4f5; }
.tab.active { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; }
.tab small { font-size: 11px; opacity: .75; font-weight: 400; }

/* 頁數標籤 */
.slide-ref {
  display: inline-block;
  background: #e3f2fd;
  color: #1565c0;
  border: 1px solid #90caf9;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  margin-left: 8px;
  vertical-align: middle;
}
.slide-ref-inline {
  color: #1565c0;
  font-size: 12px;
  background: #e3f2fd;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 6px;
}
.summary h2 .slide-ref { font-size: 13px; vertical-align: middle; }
.summary h3 .slide-ref-inline { font-size: 11px; }

.mode-tabs {
  background: rgba(255,255,255,.96);
  border-radius: 16px;
  padding: 8px;
  margin-bottom: 16px;
  display: flex;
  gap: 6px;
  box-shadow: 0 6px 16px rgba(0,0,0,.12);
}
.mode-tab {
  flex: 1;
  padding: 10px;
  border: none;
  background: #fff;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: #666;
  transition: .2s;
}
.mode-tab.active { background: #ff7043; color: white; box-shadow: 0 4px 10px rgba(255,112,67,.4); }

main {
  background: white;
  border-radius: 16px;
  padding: 28px;
  min-height: 500px;
  box-shadow: 0 10px 30px rgba(0,0,0,.2);
}

/* 重點摘要樣式 */
.summary h2 {
  color: #1e3c72;
  border-left: 5px solid #2a5298;
  padding-left: 12px;
  margin: 18px 0 14px;
  font-size: 22px;
}
.summary h3 {
  color: #2a5298;
  margin: 14px 0 8px;
  font-size: 17px;
}
.summary p, .summary li { line-height: 1.8; font-size: 15px; }
.summary ul { padding-left: 24px; margin: 8px 0; }
.summary table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 14px;
}
.summary th, .summary td {
  border: 1px solid #ccd6e0;
  padding: 8px 10px;
  text-align: left;
}
.summary th { background: #2a5298; color: white; }
.summary tr:nth-child(even) { background: #f5f8fc; }
.highlight {
  background: #fff3cd;
  padding: 12px 14px;
  border-left: 4px solid #ffa500;
  border-radius: 6px;
  margin: 10px 0;
}
.note {
  background: #e7f3ff;
  padding: 12px 14px;
  border-left: 4px solid #2196F3;
  border-radius: 6px;
  margin: 10px 0;
}
code {
  background: #f0f0f0;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: Consolas, monospace;
  color: #c7254e;
  font-size: 13px;
}

/* Flashcard 樣式 */
.flashcard-area { text-align: center; }
.flashcard {
  perspective: 1200px;
  width: 100%;
  max-width: 580px;
  height: 320px;
  margin: 20px auto;
  cursor: pointer;
}
.flashcard-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform .6s;
  transform-style: preserve-3d;
}
.flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 28px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  backface-visibility: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,.18);
}
.flashcard-front {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}
.flashcard-front .label { font-size: 13px; opacity: .85; margin-bottom: 12px; }
.flashcard-front .term { font-size: 32px; font-weight: 700; line-height: 1.3; }
.flashcard-front .hint { font-size: 13px; margin-top: 18px; opacity: .75; }
.flashcard-back {
  background: linear-gradient(135deg, #f6d365, #fda085);
  color: #333;
  transform: rotateY(180deg);
  overflow-y: auto;
}
.flashcard-back .definition { font-size: 17px; line-height: 1.7; }
.flashcard-back .definition strong { color: #c0392b; }
.flashcard-controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 18px;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 22px;
  border: none;
  border-radius: 8px;
  background: #2a5298;
  color: white;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  transition: .2s;
}
.btn:hover { background: #1e3c72; transform: translateY(-2px); }
.btn.secondary { background: #6c757d; }
.btn.success { background: #4CAF50; }
.btn.warning { background: #ff9800; }
.card-counter { font-size: 15px; color: #555; margin-top: 12px; }

/* 測驗樣式 */
.quiz-question {
  background: #f8fafc;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 14px;
  border-left: 4px solid #2a5298;
}
.quiz-question .qnum { color: #2a5298; font-weight: 700; margin-right: 6px; }
.quiz-question .qtext { font-size: 16px; line-height: 1.7; margin-bottom: 12px; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-option {
  background: white;
  border: 2px solid #e0e6ed;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
  text-align: left;
  transition: .15s;
}
.quiz-option:hover { border-color: #2a5298; background: #eef3fc; }
.quiz-option.selected { border-color: #2a5298; background: #d4e1f5; }
.quiz-option.correct { border-color: #4CAF50; background: #d4edda; color: #155724; }
.quiz-option.wrong { border-color: #f44336; background: #f8d7da; color: #721c24; }
.quiz-explain {
  display: none;
  margin-top: 10px;
  padding: 10px 12px;
  background: #fff8e1;
  border-radius: 6px;
  font-size: 14px;
  line-height: 1.6;
  border-left: 3px solid #f57c00;
}
.quiz-explain.show { display: block; }
.quiz-summary {
  background: linear-gradient(135deg, #4CAF50, #8BC34A);
  color: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  margin-top: 16px;
  font-size: 18px;
}

/* 簡答題 */
.short-q {
  background: #f8fafc;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 12px;
  border-left: 4px solid #ff7043;
}
.short-q .qtext { font-size: 15px; line-height: 1.7; margin-bottom: 10px; }
.short-q textarea {
  width: 100%;
  min-height: 80px;
  padding: 10px;
  border: 1px solid #ccd;
  border-radius: 6px;
  font-family: inherit;
  font-size: 14px;
  resize: vertical;
}
.short-q .answer {
  display: none;
  margin-top: 10px;
  padding: 12px;
  background: #e8f5e9;
  border-radius: 6px;
  border-left: 3px solid #4CAF50;
  font-size: 14px;
  line-height: 1.7;
}
.short-q .answer.show { display: block; }
.short-q .answer strong { color: #1b5e20; }

footer {
  text-align: center;
  color: rgba(255,255,255,.85);
  font-size: 13px;
  padding: 16px;
}
@media (max-width: 640px) {
  header h1 { font-size: 20px; }
  .tab { min-width: 90px; font-size: 12px; padding: 8px 10px; }
  main { padding: 18px; }
  .flashcard { height: 300px; }
  .flashcard-front .term { font-size: 24px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>第六章　802.11e 無線區域網路 QoS 複習系統</h1>
    <p>EDCA · HCCA · Block Ack · APSD · DLS — 三合一複習：重點摘要 · 閃卡 · 測驗</p>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">學習進度：0%</div>
  </header>

  <nav class="tabs" id="chapterTabs">
    <button class="tab active" data-ch="all">全部</button>
    <button class="tab" data-ch="6-1">6-1 多媒體 QoS<br><small>(P.2–12)</small></button>
    <button class="tab" data-ch="6-2">6-2 PCF<br><small>(P.13–16)</small></button>
    <button class="tab" data-ch="6-3">6-3 名詞對照<br><small>(P.17–21)</small></button>
    <button class="tab" data-ch="6-4">6-4 資料流型態<br><small>(P.22–52)</small></button>
    <button class="tab" data-ch="6-5">6-5 HCF<br><small>(P.53–61)</small></button>
    <button class="tab" data-ch="6-6">6-6 Block ACK<br><small>(P.62–68)</small></button>
    <button class="tab" data-ch="6-7">6-7 DLS<br><small>(P.69–72)</small></button>
    <button class="tab" data-ch="6-8">6-8 APSD<br><small>(P.73–76)</small></button>
  </nav>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="summary">重點摘要</button>
    <button class="mode-tab" data-mode="flashcard">閃卡記憶</button>
    <button class="mode-tab" data-mode="quiz">選擇題測驗</button>
    <button class="mode-tab" data-mode="short">簡答題</button>
  </div>

  <main id="content"></main>
  <footer>WLAN Ch06 · QoS 複習系統 · 點擊閃卡可翻面</footer>
</div>

<script>
// ===== 重點摘要資料 =====
const SUMMARY = {
  "6-1": `
    <h2>6-1 多媒體通訊的 QoS<span class="slide-ref">Slide 2–12</span></h2>
    <h3>多媒體應用的 QoS 需求<span class="slide-ref-inline">Slide 3–8</span></h3>
    <table>
      <tr><th>應用</th><th>頻寬</th><th>延遲容忍</th><th>丟包容忍</th><th>備註</th></tr>
      <tr><td>Video Streaming</td><td>2 Mb/s（SD）～20 Mb/s（HD）</td><td>高</td><td>中</td><td>MPEG-2/4、wmv</td></tr>
      <tr><td>Audio Streaming</td><td>64 kb/s ～ 1.5 Mb/s</td><td>高</td><td>中</td><td>MP3、wma、PCM</td></tr>
      <tr><td>VoIP</td><td>≤ 32 kb/s</td><td>低（&lt; 50 ms）</td><td>高</td><td>容許丟包</td></tr>
      <tr><td>Videoconferencing</td><td>128 kb/s</td><td>低（&lt; 50 ms）</td><td>高</td><td>—</td></tr>
      <tr><td>Gaming</td><td>32–128 kb/s</td><td>極低（&lt; 10 ms）</td><td>低</td><td>對封包遺失敏感</td></tr>
    </table>

    <h3>802.11e 五大新增 QoS 機制<span class="slide-ref-inline">Slide 9–12</span></h3>
    <ul>
      <li><strong>EDCA</strong>（Enhanced Distributed Channel Access）：改良 DCF，提供 8 等級優先存取（必要）</li>
      <li><strong>HCCA</strong>（HCF Controlled Channel Access）：改良 PCF，由 HC 集中分配 TXOP（必要）</li>
      <li><strong>Block Ack</strong>：一次回報多筆 QoS Data，降低 Ack 開銷（非必要）</li>
      <li><strong>APSD</strong>（Automatic Power Save Delivery）：QoS 與省電並行（非必要）</li>
      <li><strong>DLS</strong>（Direct Link Setup）：QSTA 直連，不再經 QAP 中繼（關閉點必要）</li>
    </ul>
    <div class="note">802.11e 同時支援 <strong>IntServ（整合性服務）</strong>與<strong> DiffServ（差別性服務）</strong>，且向下相容 DCF / PCF。WME（Wireless Multimedia Enhancement）為其產業實作子集。</div>
  `,
  "6-2": `
    <h2>6-2 802.11 集中式協調功能（PCF）<span class="slide-ref">Slide 13–16</span></h2>
    <h3>運作架構<span class="slide-ref-inline">Slide 13–14, 16</span></h3>
    <ul>
      <li>在 Beacon Interval 內以 <strong>CFP（免競爭時段，PCF）</strong>與<strong> CP（競爭時段，DCF）</strong>反覆交替。</li>
      <li>CFP 期間由 AP 輪詢（Polling）：B → SIFS → Data+CF-Poll → SIFS → Data+CF-Ack → … → CF-End</li>
      <li>若無線媒介忙碌會造成「CFP 縮短」延遲。</li>
      <li><strong>NAV</strong> 在 Beacon 中標示 CFP 剩餘時間，保護整段 CFP。</li>
    </ul>

    <h3>CF 參數集（CF Parameter Set）<span class="slide-ref-inline">Slide 15</span></h3>
    <table>
      <tr><th>欄位</th><th>長度 (bytes)</th></tr>
      <tr><td>項目編號</td><td>1</td></tr>
      <tr><td>長度</td><td>1</td></tr>
      <tr><td>CFP 倒數計數</td><td>1</td></tr>
      <tr><td>CFP 週期</td><td>1</td></tr>
      <tr><td>CFP 最長持續時間</td><td>2</td></tr>
      <tr><td>CFP 剩餘時間</td><td>2</td></tr>
    </table>
    <div class="highlight">原始 PCF <strong>無法明確支援多媒體 QoS</strong>，因此 802.11e 以 HCF 進一步延伸（HCF = EDCA + HCCA）。</div>
  `,
  "6-3": `
    <h2>6-3 重要名詞解釋與中英對照<span class="slide-ref">Slide 17–21</span></h2>
    <h3>角色與架構<span class="slide-ref-inline">Slide 17–18</span></h3>
    <table>
      <tr><th>縮寫</th><th>英文</th><th>中文</th></tr>
      <tr><td>QSTA</td><td>QoS Station</td><td>QoS 工作站</td></tr>
      <tr><td>QAP</td><td>QoS Access Point</td><td>QoS 基地臺</td></tr>
      <tr><td>QBSS</td><td>QoS BSS</td><td>QoS 基本服務群</td></tr>
      <tr><td>HC</td><td>Hybrid Coordinator</td><td>混合式協調器</td></tr>
      <tr><td>HCF</td><td>Hybrid Coordination Function</td><td>混合型協調功能</td></tr>
    </table>

    <h3>存取與排程<span class="slide-ref-inline">Slide 18–19</span></h3>
    <table>
      <tr><th>縮寫</th><th>中文</th></tr>
      <tr><td>AC</td><td>存取類別（Access Category）</td></tr>
      <tr><td>AIFS / AIFSN</td><td>仲裁訊框間隔 / 數值</td></tr>
      <tr><td>EDCA</td><td>加強型分散式通道存取</td></tr>
      <tr><td>HCCA</td><td>HCF 控制型通道存取</td></tr>
      <tr><td>TXOP</td><td>傳送機會</td></tr>
      <tr><td>CAP</td><td>受控制存取時段</td></tr>
    </table>

    <h3>資料流<span class="slide-ref-inline">Slide 18, 21</span></h3>
    <table>
      <tr><th>縮寫</th><th>中文</th></tr>
      <tr><td>TS</td><td>資料流（Traffic Stream）</td></tr>
      <tr><td>TSPEC</td><td>資料流規格</td></tr>
      <tr><td>TSID</td><td>資料流識別碼</td></tr>
      <tr><td>TID</td><td>資料型態辨識碼</td></tr>
      <tr><td>UP</td><td>使用者優先權</td></tr>
      <tr><td>TC / TCLAS</td><td>資料流類別 / 資料流分類</td></tr>
      <tr><td>DSCP</td><td>差別服務碼點</td></tr>
    </table>

    <h3>回報、直連、省電<span class="slide-ref-inline">Slide 19–21</span></h3>
    <table>
      <tr><th>縮寫</th><th>中文</th></tr>
      <tr><td>BA / BAR</td><td>整批回報 / 整批回報要求</td></tr>
      <tr><td>ADDBA / DELBA</td><td>新增 / 刪除 BA</td></tr>
      <tr><td>DLP / DLS</td><td>直接連結通訊協定 / 直接連結設定</td></tr>
      <tr><td>SP / SI</td><td>服務週期 / 服務時間間隔</td></tr>
      <tr><td>APSD</td><td>省電模式自動傳送</td></tr>
    </table>
  `,
  "6-4": `
    <h2>6-4 網路資料流型態分辨<span class="slide-ref">Slide 22–52</span></h2>
    <h3>QoS 訊框格式（圖 6-6）<span class="slide-ref-inline">Slide 22</span></h3>
    <p>MAC Header 新增 <strong>QoS Control（2 bytes）</strong>：</p>
    <p><code>訊框控制(2) | 待續時間(2) | 位址1(6) | 位址2(6) | 位址3(6) | 順序控制(2) | 位址4(6) | QoS Control(2) | 訊框主體(n) | FCS(4)</code></p>

      <tr><td>2</td><td>—</td><td>AC_BK</td><td>Background</td></tr>
      <tr><td></td><td>0</td><td>BE</td><td>AC_BE</td><td>Best Effort</td></tr>
      <tr><td></td><td>3</td><td>EE</td><td>AC_BE</td><td>Video</td></tr>
      <tr><td></td><td>4</td><td>CL</td><td>AC_VI</td><td>Video</td></tr>
      <tr><td></td><td>5</td><td>VI</td><td>AC_VI</td><td>Video</td></tr>
      <tr><td></td><td>6</td><td>VO</td><td>AC_VO</td><td>Voice</td></tr>
      <tr><td>最高</td><td>7</td><td>NC</td><td>AC_VO</td><td>Voice</td></tr>

    <h3>TID 數值意義（表 6-8）<span class="slide-ref-inline">Slide 52</span></h3>

  "6-5": `
    <h2>6-5 混合型協調功能（HCF）<span class="slide-ref">Slide 53–61</span></h2>
    <div class="highlight"><strong>HCF = EDCA（分散，CP 用）+ HCCA（集中，CFP/CAP 用）</strong>，且向下相容 DCF/PCF。<span class="slide-ref-inline">Slide 53</span></div>

    <h3>EDCA 通道競爭<span class="slide-ref-inline">Slide 54</span></h3>
    <p>取得 TXOP 公式：</p>
    <p><code>AIFS[AC] = SIFS + AIFSN[AC] × Slot</code></p>
    <p>AIFSN 越小 → 越快取得通道 → 優先權越高。</p>

    <h3>EDCA 預設參數（表 6-10）<span class="slide-ref-inline">Slide 55–57</span></h3>
    <table>
      <tr><th>AC</th><th>CWmin</th><th>CWmax</th><th>AIFSN</th><th>TXOP Limit (802.11b)</th><th>TXOP Limit (802.11a/g)</th></tr>
      <tr><td>AC_BK</td><td>aCWmin</td><td>aCWmax</td><td>7</td><td>0</td><td>0</td></tr>
      <tr><td>AC_BE</td><td>aCWmin</td><td>4·(aCWmin+1)−1</td><td>3</td><td>0</td><td>0</td></tr>
      <tr><td>AC_VI</td><td>(aCWmin+1)/2−1</td><td>aCWmin</td><td>1</td><td><strong>6.016 ms</strong></td><td><strong>3.008 ms</strong></td></tr>
      <tr><td>AC_VO</td><td>(aCWmin+1)/4−1</td><td>(aCWmin+1)/2−1</td><td>1</td><td><strong>3.264 ms</strong></td><td><strong>1.504 ms</strong></td></tr>
    </table>

    <h3>QoS Classes：8 級優先 + Scheduler<span class="slide-ref-inline">Slide 31</span></h3>
    <ul>
      <li>每 QSTA 內部同時跑 <strong>AC0–AC7</strong> 共 8 個 backoff 實例。</li>
      <li>同時取得相同時槽的傳送機會時 → 「<strong>虛擬碰撞</strong>」。</li>
      <li>Scheduler 將 TXOP 配給優先權最高的 AC，犧牲低優先 AC。</li>
    </ul>

    <h3>HCCA vs PCF<span class="slide-ref-inline">Slide 60</span></h3>

      <tr><td>QoS 保證</td><td>無</td><td>是（TSPEC + 準入控制）</td></tr>

    detail:"<strong>為何 802.11b 的 TXOP 較長？</strong><br>● 802.11b 速率較低（最大 11 Mb/s），傳送同樣 payload 需要更多時間<br>● 故給予更長的 TXOP 才能完成一筆 Video Frame<br>● 802.11a/g 速率較高（最大 54 Mb/s），TXOP 約為一半即可<br><br>VI 預設值：<br>● 802.11b：<strong>6.016 ms</strong><br>● 802.11a/g：<strong>3.008 ms</strong><br>對應 VO 為 3.264 / 1.504 ms。" },
  { ch:"6-5", slide:"P.31", q:"同 QSTA 內多個 AC 同時取得傳送機會稱為？", opts:["實體碰撞","虛擬碰撞","內部碰撞","通道碰撞"], ans:1,
    exp:"虛擬碰撞（Virtual Collision）。",
    detail:"<strong>虛擬碰撞處理（Slide 31 圖示）：</strong><br>● 每 QSTA 內部跑 <strong>AC0–AC7 共 8 個 backoff 實例</strong>，各自有 AIFSi/CWi/PFi<br>● 若多個 AC 同時把退避計數器歸零 → 都想傳送 → 發生『虛擬碰撞』<br>● 由 <strong>Scheduler（虛擬碰撞處理器）</strong>裁決：<br>　- 把實體 TXOP 配給<strong>優先權最高</strong>的 AC（如 AC_VO &gt; AC_VI &gt; AC_BE &gt; AC_BK）<br>　- 較低優先 AC 視同碰撞，啟動 Binary Exponential Backoff 重新退避<br>● 因此名為『<u>虛擬</u>』碰撞 —— 沒有真實的空中碰撞發生。" },
  { ch:"6-5", slide:"P.31", q:"802.11e 規定每個 QSTA 內部會有幾個 backoff 實例？", opts:["1","4","8","16"], ans:2,
    exp:"AC0–AC7 共 8 個 backoff 實例。",
    detail:"<strong>QoS Classes（Slide 31）：</strong><br>● Legacy STA：<u>只有 1 個</u> backoff 實例（DIFS / CW / 2）<br>● QSTA：<strong>8 個 backoff 實例</strong>（AC0 ~ AC7），對應 UP 0~7<br>● 雖然有 8 個 UP，但只對應到 4 個 AC（BK/BE/VI/VO），這 4 個 AC 仍會分別實作獨立佇列<br>● 8 級優先機制由 Scheduler 集中協調，避免內部互搶。" },
  { ch:"6-5", slide:"P.60", q:"HCCA 與傳統 PCF 最大的差異是？", opts:["HCCA 不能輪詢","HCCA 可於 CP 中啟動 CAP 取得通道","HCCA 不支援廣播","HCCA 僅支援單一站台"], ans:1,
    exp:"HCCA 允許 HC 在 CP 中以 QoS CF-Poll 啟動 CAP。",
    detail:"<strong>HCCA vs PCF（圖 6-22）：</strong><br><table style='font-size:13px;border-collapse:collapse;'><tr><th style='border:1px solid #ccc;padding:4px;'>項目</th><th style='border:1px solid #ccc;padding:4px;'>PCF</th><th style='border:1px solid #ccc;padding:4px;'>HCCA</th></tr><tr><td style='border:1px solid #ccc;padding:4px;'>運作時段</td><td style='border:1px solid #ccc;padding:4px;'>僅 CFP</td><td style='border:1px solid #ccc;padding:4px;'><strong>CFP + CP 皆可</strong></td></tr><tr><td style='border:1px solid #ccc;padding:4px;'>CP 中介入</td><td style='border:1px solid #ccc;padding:4px;'>不可</td><td style='border:1px solid #ccc;padding:4px;'><strong>用 QoS CF-Poll 開 CAP</strong></td></tr><tr><td style='border:1px solid #ccc;padding:4px;'>輪詢訊框</td><td style='border:1px solid #ccc;padding:4px;'>CF-Poll</td><td style='border:1px solid #ccc;padding:4px;'>QoS CF-Poll</td></tr><tr><td style='border:1px solid #ccc;padding:4px;'>QoS 保證</td><td style='border:1px solid #ccc;padding:4px;'>無</td><td style='border:1px solid #ccc;padding:4px;'>有（TSPEC + Admission Control）</td></tr></table>" },

  // ===== 6-6 =====
  { ch:"6-6", slide:"P.34, 62", q:"建立 Block Ack 工作階段使用的 Action 訊框為？", opts:["ADDTS","ADDBA","DLP","ADDIE"], ans:1,
    exp:"ADDBA Request / Response 用於建立 BA 工作階段。",
    detail:"<strong>BA Action Frames（Slide 34）：</strong><br>● <strong>0 = ADDBA Request</strong>（建立要求）<br>● 1 = ADDBA Response（含 Status Code）<br>● 2 = DELBA（拆除）<br>● 3–255 = 保留<br><br>ADDBA 訊框主體欄位：類別 / Action / Dialog Token / Block Ack Parameter Set / BA Timeout Value。建立後即可開始 N×QoS Data → BlockAckReq → BlockAck 的交換週期。" },
  { ch:"6-6", slide:"P.65–66", q:"Immediate Block Ack 與 Delayed Block Ack 的主要差異？", opts:["訊框長度","BlockAck 回應的時機","加密方式","頻寬"], ans:1,
    exp:"BlockAck 回應的時機不同。",
    detail:"<strong>兩種運作方式比較：</strong><br>● <strong>Immediate Block Ack（圖 6-27）</strong>：來源連續送 N 筆 QoS Data + BlockAckReq，目的端<strong>立即</strong>回 BlockAck。NAV 單段保護。延遲低，但要求目的端能即時計算 Bitmap。<br>● <strong>Delayed Block Ack（圖 6-28）</strong>：目的端先回普通 Ack（佔位），稍後另起一回合送 BlockAck。NAV 跨兩段。允許實作端有更多時間處理，但通道使用較鬆散。<br><br>選擇取決於硬體能力與延遲需求。" },
  { ch:"6-6", slide:"P.63", q:"BA Parameter Set 中 B6–B15 代表？", opts:["整批回報策略","整批回報大小（buffer size）","TID","發起者"], ans:1,
    exp:"B6–B15 = 整批回報大小（buffer size）。",
    detail:"<strong>BA Parameter Set 結構（2 bytes = 16 bit）：</strong><br>● B0 = 保留<br>● <strong>B1 = 整批回報策略</strong>（0 = Delayed, 1 = Immediate）<br>● <strong>B2–B5 = 元組（TID）</strong>，標示此 BA 對應的資料流<br>● <strong>B6–B15 = Buffer Size</strong>（10 bit，最大 1023）—— 表示可緩衝的 MPDU 數量上限<br><br>BlockAck 的 Bitmap 大小（64 bit 或 256 bit 視版本）也與此有關。" },
  { ch:"6-6", slide:"P.64, 67", q:"DELBA 參數集合中 B11 代表？", opts:["TID","發起者（Initiator）","策略","保留"], ans:1,
    exp:"B11 = 發起者（Initiator）。",
    detail:"<strong>DELBA 參數集合（16 bit）：</strong><br>● B0–B10 = 保留<br>● <strong>B11 = Initiator</strong>（發起者旗標）<br>　- 1：拆除請求由 BA 起始者發出<br>　- 0：由 BA 接收者發出<br>● <strong>B12–B15 = TID</strong>（資料型態辨識碼，4 bit）<br><br>由於 BA 為雙向協議，任一方都可拆除，需此旗標標示來源。" },
  { ch:"6-6", slide:"P.62", q:"Block Ack 的主要效益是？", opts:["加密更強","降低 Ack 與 IFS 開銷","減少站台數量","增加廣播範圍"], ans:1,
    exp:"降低個別 Ack 與 IFS 開銷。",
    detail:"<strong>Block Ack 的效益分析：</strong><br>● 傳統：每筆 Data → SIFS → Ack（每筆都要等 SIFS+Ack）<br>● BA：N 筆 Data 連發 → SIFS → 1 個 BlockAck<br><br>節省 = (N − 1) × (SIFS + Ack 時間)<br><br>● 搭配 <strong>A-MPDU（聚合 MPDU）</strong>可進一步壓縮 PHY 額外負擔<br>● 在 802.11n/ac/ax 的高吞吐情境是必備機制<br>● 缺點：若 BA 遺失，整批 MPDU 需重傳。" },

  // ===== 6-7 =====
  { ch:"6-7", slide:"P.69", q:"DLS 設定階段必須經過？", opts:["僅 QSTA-1 與 QSTA-2 互傳","QAP 居中協調","其他 BSS 的 AP","中央伺服器"], ans:1,
    exp:"DLS 設定需透過 QAP 居中協調。",
    detail:"<strong>DLS 設定流程（圖 6-30）：</strong><br>● (1a) QSTA-1 → QAP：DLS-Req<br>● (1b) QAP → QSTA-2：轉發 DLS-Req<br>● (2a) QSTA-2 → QAP：DLS-Resp<br>● (2b) QAP → QSTA-1：轉發 DLS-Resp<br>● 完成後 QSTA-1 ⇄ QSTA-2 改走直接路徑<br><br>為何要經 QAP？<br>① QAP 可確認雙方均支援 DLS<br>② QAP 控制 BSS 認證/加密金鑰交換<br>③ QAP 維持 Association 與 QoS 統計" },
  { ch:"6-7", slide:"P.70–71", q:"DLS Response 比 DLS Request 多出哪一個欄位？", opts:["DLS Timeout","來源 MAC","狀態碼","容量資訊"], ans:2,
    exp:"DLS Response 第 3 欄為狀態碼。",
    detail:"<strong>DLS Request vs Response 欄位對照：</strong><br><table style='font-size:13px;border-collapse:collapse;'><tr><th style='border:1px solid #ccc;padding:4px;'>#</th><th style='border:1px solid #ccc;padding:4px;'>Request（圖 6-31）</th><th style='border:1px solid #ccc;padding:4px;'>Response（圖 6-32）</th></tr><tr><td style='border:1px solid #ccc;padding:4px;'>1</td><td style='border:1px solid #ccc;padding:4px;'>類別</td><td style='border:1px solid #ccc;padding:4px;'>類別</td></tr><tr><td style='border:1px solid #ccc;padding:4px;'>2</td><td style='border:1px solid #ccc;padding:4px;'>Action</td><td style='border:1px solid #ccc;padding:4px;'>Action</td></tr><tr><td style='border:1px solid #ccc;padding:4px;'>3</td><td style='border:1px solid #ccc;padding:4px;'>目的 MAC</td><td style='border:1px solid #ccc;padding:4px;'><strong>狀態碼 ★</strong></td></tr><tr><td style='border:1px solid #ccc;padding:4px;'>4</td><td style='border:1px solid #ccc;padding:4px;'>來源 MAC</td><td style='border:1px solid #ccc;padding:4px;'>目的 MAC</td></tr><tr><td style='border:1px solid #ccc;padding:4px;'>5</td><td style='border:1px solid #ccc;padding:4px;'>容量資訊</td><td style='border:1px solid #ccc;padding:4px;'>來源 MAC</td></tr><tr><td style='border:1px solid #ccc;padding:4px;'>6</td><td style='border:1px solid #ccc;padding:4px;'>DLS Timeout</td><td style='border:1px solid #ccc;padding:4px;'>容量資訊</td></tr><tr><td style='border:1px solid #ccc;padding:4px;'>7</td><td style='border:1px solid #ccc;padding:4px;'>支援速率</td><td style='border:1px solid #ccc;padding:4px;'>支援速率</td></tr></table><br>狀態碼用以告知接受 / 拒絕的原因。" },
  { ch:"6-7", slide:"P.72", q:"DLS Teardown 訊框主體共幾個欄位？", opts:["3","4","5","7"], ans:1,
    exp:"DLS Teardown = 4 欄。",
    detail:"<strong>DLS Teardown 欄位（圖 6-33）：</strong><br>1. 類別（Category）<br>2. Action<br>3. 目的工作站 MAC 位址<br>4. 來源工作站 MAC 位址<br><br>● 不需 Status Code、Capability、DLS Timeout、Supported Rates<br>● 因為只是『拆除既有連結』，不必再協商能力<br>● 任一方都可主動拆除（與 DELBA 類似）。" },
  { ch:"6-7", slide:"P.69", q:"DLS 完成設定後，QSTA 間如何傳送資料？", opts:["仍經 QAP 中繼","走直接連結","只能廣播","透過 IBSS"], ans:1,
    exp:"設定後改走直接連結。",
    detail:"<strong>DLS 完成後的資料路徑：</strong><br>● 設定階段：必經 QAP（4 個訊框交換）<br>● 完成後：QSTA-1 ⇄ QSTA-2 直接傳輸資料訊框<br>● 效益：<br>　① 減少 QAP 的中繼負擔（避免雙跳）<br>　② 縮短 end-to-end 延遲（單跳即可）<br>　③ 對 P2P 應用（檔案分享、遊戲）特別有用<br>● 限制：兩 QSTA 必須在同一 BSS、且同時在 QAP 覆蓋範圍內；以 DLS Teardown 拆除。" },

  // ===== 6-8 =====
  { ch:"6-8", slide:"P.73", q:"APSD 中喚醒 QAP 送出緩衝資料的訊框為？", opts:["Beacon","Trigger Frame","PS-Poll","RTS"], ans:1,
    exp:"Trigger Frame 啟動服務週期。",
    detail:"<strong>APSD 觸發機制（圖 6-34）：</strong><br>● 傳統 PS：STA 醒來看 TIM → 送 <u>PS-Poll</u> → AP 一次回一筆<br>● APSD：STA 送 <strong>Trigger Frame</strong> → AP <u>連續</u>送出整個 SP 內的緩衝資料<br><br>Trigger Frame 通常是一個帶 EOSP 屬性的 QoS Null/QoS Data 訊框。<br><br>● <strong>U-APSD</strong>：STA 自行決定何時觸發（手機常用，省電）<br>● <strong>S-APSD</strong>：依 Schedule IE 約定週期，由 AP 主動發起。" },
  { ch:"6-8", slide:"P.23, 76", q:"EOSP=1 代表？", opts:["此非最後一筆","服務週期最後一筆","加密啟動","廣播訊框"], ans:1,
    exp:"EOSP=1 → 服務週期最後一筆。",
    detail:"<strong>EOSP（End Of Service Period）：</strong><br>● 位於 QoS Control 的 <strong>Bit 4</strong>，僅 1 bit<br>● 0：此訊框非 SP 最後一筆，STA 應繼續接收<br>● <strong>1：此訊框為 SP 最後一筆</strong>，STA 可結束 SP / 進入休眠<br><br>實務上 AP 會在送出 buffered 訊框的最後一筆時把 EOSP 設為 1，讓 STA 知道可以安心睡覺，這是 APSD 省電的關鍵控制位元。" },
  { ch:"6-8", slide:"P.76", q:"當 More Data=1、EOSP=0 時，QSTA 應如何處理？", opts:["結束 SP 並休眠","維持作用繼續接收","重啟連線","切換通道"], ans:1,
    exp:"AP 仍有緩衝且非最後一筆 → QSTA 繼續接收。",
    detail:"<strong>表 6-11 條件矩陣全表：</strong><table style='font-size:13px;border-collapse:collapse;margin-top:6px;'><tr><th style='border:1px solid #ccc;padding:4px;'>MoreData</th><th style='border:1px solid #ccc;padding:4px;'>EOSP</th><th style='border:1px solid #ccc;padding:4px;'>QSTA 動作</th></tr><tr><td style='border:1px solid #ccc;padding:4px;text-align:center;'>0</td><td style='border:1px solid #ccc;padding:4px;text-align:center;'>0</td><td style='border:1px solid #ccc;padding:4px;'>結束 SP</td></tr><tr><td style='border:1px solid #ccc;padding:4px;text-align:center;'>0</td><td style='border:1px solid #ccc;padding:4px;text-align:center;'>1</td><td style='border:1px solid #ccc;padding:4px;'>結束 SP 並休眠</td></tr><tr style='background:#fff3cd;'><td style='border:1px solid #ccc;padding:4px;text-align:center;'><strong>1</strong></td><td style='border:1px solid #ccc;padding:4px;text-align:center;'><strong>0</strong></td><td style='border:1px solid #ccc;padding:4px;'><strong>維持作用繼續接收 ★</strong></td></tr><tr><td style='border:1px solid #ccc;padding:4px;text-align:center;'>1</td><td style='border:1px solid #ccc;padding:4px;text-align:center;'>1</td><td style='border:1px solid #ccc;padding:4px;'>結束本 SP，下次觸發續傳</td></tr></table>" },
  { ch:"6-8", slide:"P.73", q:"APSD 的主要效益為？", opts:["增加加密強度","維持 QoS 同時延長電池續航","擴大覆蓋範圍","支援多 BSS"], ans:1,
    exp:"兼顧 QoS 與省電。",
    detail:"<strong>APSD vs 傳統 PS-Poll：</strong><br>● 傳統 PS：每筆訊框都要 STA 主動 PS-Poll → 一次只收一筆 → 多次喚醒，效率低<br>● APSD：一次 Trigger 即可在 SP 內<strong>連續</strong>收取多筆 → 喚醒次數減少 → 電池壽命延長<br>● 同時保留 QoS：可指定特定 AC（如 VoIP 的 AC_VO）走 APSD<br><br>這是 802.11e 對行動裝置（手機、IoT）的關鍵設計，後續被 802.11n/ac/ax 沿用並強化。" },
  { ch:"6-8", slide:"P.73", q:"U-APSD 與 S-APSD 的差異？", opts:["速率不同","頻段不同","U 由 QSTA 觸發、S 依排程","加密方式不同"], ans:2,
    exp:"U-APSD 由 QSTA 觸發；S-APSD 依排程。",
    detail:"<strong>U-APSD vs S-APSD：</strong><br>● <strong>U-APSD（Unscheduled APSD）</strong><br>　- STA 主動以 Trigger Frame 啟動 SP<br>　- AP 不主動推播<br>　- 適合間歇性流量（如 VoIP idle）<br><br>● <strong>S-APSD（Scheduled APSD）</strong><br>　- AP 依 <strong>Schedule IE</strong> 約定的 Service Interval 主動發起 SP<br>　- 不需 Trigger Frame<br>　- 適合週期性流量（如固定速率 Video）<br><br>實務上 WMM-PS 主要實作 U-APSD（即 WMM Power Save）。" }
];

const SHORT_Q = [
  { ch:"6-1", slide:"P.9–12", q:"列舉並簡述 802.11e 新增的五大 QoS 機制。", ans:"<strong>① EDCA</strong>（加強型分散式通道存取）：改良 DCF，提供 8 等級優先存取（必要）。<br><strong>② HCCA</strong>（HCF 控制型通道存取）：由 HC 集中分配 TXOP（必要）。<br><strong>③ Block Ack</strong>（整批回報）：一次回報多筆 QoS Data MPDU。<br><strong>④ APSD</strong>（省電模式自動傳送）：兼顧 QoS 與省電。<br><strong>⑤ DLS</strong>（直接連結設定）：兩 QSTA 跳過 QAP 直接傳輸。" },
  { ch:"6-2", slide:"P.13–16", q:"說明 PCF 與 DCF 在 Beacon Interval 中的交替方式，以及 NAV 的角色。", ans:"在 Beacon Interval 內以 <strong>CFP（PCF，免競爭）</strong>與 <strong>CP（DCF，競爭）</strong>反覆交替。PCF 期間 AP 以 SIFS 間隔做 CF-Poll/CF-Ack 輪詢；<strong>NAV</strong> 由 Beacon 內的 CFP 剩餘時間更新，<strong>保護整段 CFP 不被其他站台搶用</strong>。若媒介忙碌會造成 CFP 縮短。" },
  { ch:"6-4", slide:"P.23, 28–29", q:"說明 QoS Control 欄位（2 bytes）各位元的意義，並區分 HC 與 non-AP QSTA 的差異。", ans:"<strong>共同：</strong>Bits 0–3=TID、Bit 4=EOSP、Bits 5–6=Ack 策略、Bit 7=保留。<br><strong>HC 送 QoS+CF-Poll：</strong>Bits 8–15 = TXOP 限制（32 μs/單位）。<br><strong>HC 送 QoS Data/Null：</strong>Bits 8–15 = 保留。<br><strong>non-AP QSTA（Bit 4=0）：</strong>Bits 8–15 = TXOP 持續時間要求。<br><strong>non-AP QSTA（Bit 4=1）：</strong>Bits 8–15 = 佇列大小（256 octets/單位）。" },
  { ch:"6-4", slide:"P.30", q:"列出 UP 0–7 對應的 AC，並指出優先權順序。", ans:"由低到高：<br>UP=1, 2 → <strong>AC_BK</strong>（Background）<br>UP=0, 3 → <strong>AC_BE</strong>（Best Effort）<br>UP=4, 5 → <strong>AC_VI</strong>（Video）<br>UP=6, 7 → <strong>AC_VO</strong>（Voice，最高）<br>注意：UP=1 最低，UP=0 因 BE 比 BK 高，故排第三。" },
  { ch:"6-5", slide:"P.54, 56", q:"寫出 EDCA 的 AIFS 公式，並解釋為何 AIFSN 越小優先權越高。", ans:"公式：<strong>AIFS[AC] = SIFS + AIFSN[AC] × Slot Time</strong>。<br>AIFSN 越小 → AIFS 等待時間越短 → 該 AC 越早結束 IFS 進入退避競爭 → 取得通道機率越高 → 優先權越高。預設值 AC_VO=AC_VI=1（最短）、AC_BE=3、AC_BK=7（最長）。" },
  { ch:"6-5", slide:"P.31", q:"說明何謂虛擬碰撞，以及 Scheduler 如何處理。", ans:"<strong>虛擬碰撞</strong>指同一 QSTA 內的多個 AC（AC0–AC7）同時取得相同 slot 的傳送機會。由於只能傳送一筆，Scheduler 會將 TXOP <strong>配給優先權最高的 AC</strong>，較低優先 AC 視同碰撞，重新進入退避。" },
  { ch:"6-6", slide:"P.62–68", q:"描述 Block Ack 的完整三階段流程。", ans:"<strong>① 建立階段：</strong>來源送 ADDBA Request（含 BA Parameter Set 與 Timeout），目的端回 ADDBA Response（含 Status Code）。<br><strong>② 傳輸階段：</strong>來源連續送 N 筆 QoS Data MPDU，最後送 BlockAckReq；目的端以一筆 BlockAck 回報全部成功狀態（Immediate 立即；Delayed 延後另送）。<br><strong>③ 拆除階段：</strong>以 DELBA Request 拆除工作階段。" },
  { ch:"6-7", slide:"P.69–72", q:"列出 DLS 設定的四個訊框交換順序，以及完成後資料流路徑。", ans:"<strong>設定階段：</strong>(1a) QSTA-1→QAP DLS-要求；(1b) QAP→QSTA-2 DLS-要求；(2a) QSTA-2→QAP DLS-回應；(2b) QAP→QSTA-1 DLS-回應。<br><strong>完成後：</strong>QSTA-1 ⇄ QSTA-2 改走<strong>直接連結</strong>傳輸，不再經 QAP 中繼。<br><strong>結束時：</strong>任一方送 DLS Teardown 拆除。" },
  { ch:"6-8", slide:"P.73, 76", q:"說明 APSD 中 More Data 與 EOSP 兩位元組合所對應的 4 種處理動作。", ans:"<strong>(MoreData=0, EOSP=0)：</strong>AP 無緩衝且此非最後一筆 → QSTA 結束服務週期。<br><strong>(0, 1)：</strong>AP 無緩衝且此非最後一筆 → QSTA 結束服務週期並進入休眠。<br><strong>(1, 0)：</strong>AP 仍有緩衝、此非最後一筆 → QSTA 維持作用繼續接收。<br><strong>(1, 1)：</strong>AP 仍有緩衝、此為最後一筆 → QSTA 結束本週期；後續訊框於下次觸發後再傳。" }
];

// ===== 全域狀態 =====
let currentCh = "all";
let currentMode = "summary";
let cardIdx = 0;
let cardList = [];
let quizState = {}; // q index -> chosen index
let viewed = JSON.parse(localStorage.getItem('wlan_ch6_viewed') || '{}');

// ===== 渲染入口 =====
const content = document.getElementById('content');
function render() {
  if (currentMode === "summary") renderSummary();
  else if (currentMode === "flashcard") renderFlashcard();
  else if (currentMode === "quiz") renderQuiz();
  else if (currentMode === "short") renderShort();
  updateProgress();
}

function renderSummary() {
  const chapters = currentCh === "all"
    ? Object.keys(SUMMARY)
    : [currentCh];
  let html = '<div class="summary">';
  chapters.forEach(ch => { html += SUMMARY[ch] || ''; });
  html += '</div>';
  content.innerHTML = html;
  chapters.forEach(ch => { viewed[`summary_${ch}`] = true; });
  saveViewed();
}

function renderFlashcard() {
  cardList = FLASHCARDS.filter(c => currentCh === "all" || c.ch === currentCh);
  if (cardList.length === 0) { content.innerHTML = '<p>此章節無閃卡。</p>'; return; }
  if (cardIdx >= cardList.length) cardIdx = 0;
  const c = cardList[cardIdx];
  content.innerHTML = `
    <div class="flashcard-area">
      <div class="flashcard" id="flashcard" onclick="this.classList.toggle('flipped')">
        <div class="flashcard-inner">
          <div class="flashcard-face flashcard-front">
            <div class="label">${c.ch} · 第 ${cardIdx+1} / ${cardList.length} 張 · <span style="background:rgba(255,255,255,.25);padding:2px 8px;border-radius:8px;">${c.slide}</span></div>
            <div class="term">${c.term}</div>
            <div class="hint">點擊翻面看解答</div>
          </div>
          <div class="flashcard-face flashcard-back">
            <div class="definition">${c.def}</div>
            <div style="margin-top:14px;font-size:12px;color:#7a3b00;opacity:.85;">📖 對應投影片：${c.slide}</div>
          </div>
        </div>
      </div>
      <div class="flashcard-controls">
        <button class="btn secondary" onclick="prevCard()">← 上一張</button>
        <button class="btn warning" onclick="shuffleCards()">隨機洗牌</button>
        <button class="btn success" onclick="nextCard()">下一張 →</button>
      </div>
      <div class="card-counter">${c.ch} · ${cardIdx+1} / ${cardList.length} · 對應投影片 ${c.slide}</div>
    </div>
  `;
  viewed[`card_${c.ch}_${c.term}`] = true;
  saveViewed();
}
function nextCard() { cardIdx = (cardIdx+1) % cardList.length; renderFlashcard(); }
function prevCard() { cardIdx = (cardIdx-1+cardList.length) % cardList.length; renderFlashcard(); }
function shuffleCards() { cardList.sort(() => Math.random()-0.5); cardIdx=0; renderFlashcard(); }

function renderQuiz() {
  const qs = QUIZ.filter(q => currentCh === "all" || q.ch === currentCh);
  if (qs.length === 0) { content.innerHTML = '<p>此章節無測驗題。</p>'; return; }
  quizState = {};
  let html = `<div id="quizArea"><p style="font-size:14px;color:#666;margin-bottom:14px;">共 ${qs.length} 題，作答完畢請按下方「對答案」。</p>`;
  qs.forEach((q, i) => {
    html += `<div class="quiz-question" data-i="${i}">
      <div class="qtext"><span class="qnum">Q${i+1}.</span>${q.q}<span style="font-size:12px;color:#1565c0;background:#e3f2fd;padding:2px 8px;border-radius:8px;float:right;">${q.ch} · ${q.slide}</span></div>
      <div class="quiz-options">
        ${q.opts.map((o, oi) => `<button class="quiz-option" onclick="selectOption(${i},${oi})" data-i="${i}" data-oi="${oi}">(${String.fromCharCode(65+oi)}) ${o}</button>`).join('')}
      </div>
      <div class="quiz-explain" id="exp-${i}"><strong>正解：(${String.fromCharCode(65+q.ans)}) ${q.opts[q.ans]}</strong><br>${q.exp}<br><span style="font-size:12px;color:#1565c0;">📖 對應投影片：${q.slide}</span></div>
    </div>`;
  });
  html += `<div style="text-align:center;margin-top:20px;">
    <button class="btn" onclick="checkAnswers()">對答案</button>
    <button class="btn secondary" onclick="renderQuiz()">重新作答</button>
    <div id="quizResult"></div>
  </div></div>`;
  content.innerHTML = html;
}
function selectOption(i, oi) {
  quizState[i] = oi;
  document.querySelectorAll(`.quiz-option[data-i="${i}"]`).forEach(b => b.classList.remove('selected'));
  document.querySelector(`.quiz-option[data-i="${i}"][data-oi="${oi}"]`).classList.add('selected');
}
function checkAnswers() {
  const qs = QUIZ.filter(q => currentCh === "all" || q.ch === currentCh);
  let correct = 0;
  qs.forEach((q, i) => {
    document.querySelectorAll(`.quiz-option[data-i="${i}"]`).forEach((b, oi) => {
      b.classList.remove('selected');
      if (oi === q.ans) b.classList.add('correct');
      if (quizState[i] === oi && oi !== q.ans) b.classList.add('wrong');
    });
    document.getElementById(`exp-${i}`).classList.add('show');
    if (quizState[i] === q.ans) correct++;
  });
  const pct = Math.round(correct/qs.length*100);
  document.getElementById('quizResult').innerHTML = `<div class="quiz-summary">答對 ${correct} / ${qs.length} 題 · 得分 ${pct} 分</div>`;
  viewed[`quiz_${currentCh}`] = true;
  saveViewed();
}

function renderShort() {
  const qs = SHORT_Q.filter(q => currentCh === "all" || q.ch === currentCh);
  if (qs.length === 0) { content.innerHTML = '<p>此章節無簡答題。</p>'; return; }
  let html = `<p style="font-size:14px;color:#666;margin-bottom:14px;">先嘗試自行作答，再點「顯示參考答案」對照。</p>`;
  qs.forEach((q, i) => {
    html += `<div class="short-q">
      <div class="qtext"><strong>Q${i+1}.</strong> ${q.q}<span style="font-size:12px;color:#1565c0;background:#e3f2fd;padding:2px 8px;border-radius:8px;float:right;">${q.ch} · ${q.slide}</span></div>
      <textarea placeholder="在此寫下你的答案..."></textarea>
      <div style="margin-top:8px;">
        <button class="btn warning" onclick="toggleAns(${i})">顯示 / 隱藏參考答案</button>
      </div>
      <div class="answer" id="ans-${i}"><strong>參考答案：</strong>${q.ans}<br><span style="font-size:12px;color:#1565c0;">📖 對應投影片：${q.slide}</span></div>
    </div>`;
  });
  content.innerHTML = html;
}
function toggleAns(i) {
  document.getElementById(`ans-${i}`).classList.toggle('show');
  viewed[`short_${currentCh}_${i}`] = true;
  saveViewed();
}

// ===== 進度 =====
function updateProgress() {
  // 簡單計算：摘要 8 + 閃卡章 8 + 測驗章 8 + 簡答章 8 = 32
  const totalSlots = 32;
  let done = 0;
  const chs = ['6-1','6-2','6-3','6-4','6-5','6-6','6-7','6-8'];
  chs.forEach(ch => {
    if (viewed[`summary_${ch}`]) done++;
    if (Object.keys(viewed).some(k => k.startsWith(`card_${ch}_`))) done++;
    if (viewed[`quiz_${ch}`] || viewed[`quiz_all`]) done++;
    if (Object.keys(viewed).some(k => k.startsWith(`short_${ch}_`)) || Object.keys(viewed).some(k => k.startsWith(`short_all_`))) done++;
  });
  const pct = Math.min(100, Math.round(done/totalSlots*100));
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `學習進度：${pct}%（${done} / ${totalSlots}）`;
}
function saveViewed() { localStorage.setItem('wlan_ch6_viewed', JSON.stringify(viewed)); updateProgress(); }

// ===== 事件 =====
document.querySelectorAll('#chapterTabs .tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('#chapterTabs .tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentCh = t.dataset.ch;
    cardIdx = 0;
    render();
  });
});
document.querySelectorAll('.mode-tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentMode = t.dataset.mode;
    cardIdx = 0;
    render();
  });
});

render();
</script>
</body>
</html>
